<!doctype html>
<html lang="zh-CN" class="">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ForgeFin · Sidebar 示例</title>
    <link rel="stylesheet" href="../styles/index.css" />
  </head>
  <body>
    <div class="app-layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <span class="sidebar-logo-icon">◈</span>
          <span>ForgeFin</span>
        </div>
        <nav class="sidebar-nav">
          <div class="sidebar-section-title">工作台</div>
          <div class="sidebar-item active">
            <span class="sidebar-item-icon">▣</span>
            <span>仪表盘</span>
          </div>
          <div class="sidebar-item">
            <span class="sidebar-item-icon">▤</span>
            <span>凭证管理</span>
          </div>
          <div class="sidebar-section-title">财务</div>
          <div class="sidebar-item">
            <span class="sidebar-item-icon">▥</span>
            <span>总账</span>
          </div>
          <div class="sidebar-item">
            <span class="sidebar-item-icon">▦</span>
            <span>报表</span>
          </div>
        </nav>
      </aside>

      <!-- Main -->
      <main class="app-main">
        <header class="app-header">
          <div class="app-header-left">
            <span class="page-title">仪表盘</span>
          </div>
          <div class="app-header-right">
            <span class="header-avatar">Z</span>
          </div>
        </header>
        <section class="app-content">
          <div class="card stat-card">
            <span class="stat-card-label">本月收入</span>
            <span class="stat-card-value">¥ 1,280,500.00</span>
            <span class="stat-card-delta up">↑ 12.4%</span>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
